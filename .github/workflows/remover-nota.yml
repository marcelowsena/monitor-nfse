name: Remover Nota do KV

on:
  workflow_dispatch:
    inputs:
      obra_key:
        description: 'Chave da obra (ex: max)'
        required: true
        default: 'max'
      numero_nfse:
        description: 'Número da NFS-e a remover (ex: 2400000000021)'
        required: true

jobs:
  remover:
    name: Remover nota ${{ inputs.numero_nfse }} da obra ${{ inputs.obra_key }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Remover nota do KV
        env:
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
          CF_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
        run: python -m monitor.remover_nota "${{ inputs.obra_key }}" "${{ inputs.numero_nfse }}"
