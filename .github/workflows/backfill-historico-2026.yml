name: Backfill Historico NFS-e 2026

on:
  workflow_dispatch:
    inputs:
      obras:
        description: 'Obras a processar (separadas por espaco). Deixe vazio para todas.'
        required: false
        default: 'arium confraria_benjamin cora nola'

jobs:
  backfill:
    name: Backfill NFS-e 2026
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Decodificar certificados
        run: |
          echo "${{ secrets.CERT_MAX_B64 }}"                | base64 -d > /tmp/cert_max.pfx
          echo "${{ secrets.CERT_ARIUM_B64 }}"              | base64 -d > /tmp/cert_arium.pfx
          echo "${{ secrets.CERT_CONFRARIA_BENJAMIN_B64 }}" | base64 -d > /tmp/cert_confraria_benjamin.pfx
          echo "${{ secrets.CERT_CORA_B64 }}"               | base64 -d > /tmp/cert_cora.pfx
          echo "${{ secrets.CERT_NOLA_B64 }}"               | base64 -d > /tmp/cert_nola.pfx

      - name: Executar backfill
        env:
          CERT_MAX_PATH:                /tmp/cert_max.pfx
          CERT_MAX_SENHA:               ${{ secrets.CERT_MAX_SENHA }}
          CERT_ARIUM_PATH:              /tmp/cert_arium.pfx
          CERT_ARIUM_SENHA:             ${{ secrets.CERT_ARIUM_SENHA }}
          CERT_CONFRARIA_BENJAMIN_PATH: /tmp/cert_confraria_benjamin.pfx
          CERT_CONFRARIA_BENJAMIN_SENHA: ${{ secrets.CERT_CONFRARIA_BENJAMIN_SENHA }}
          CERT_CORA_PATH:               /tmp/cert_cora.pfx
          CERT_CORA_SENHA:              ${{ secrets.CERT_CORA_SENHA }}
          CERT_NOLA_PATH:               /tmp/cert_nola.pfx
          CERT_NOLA_SENHA:              ${{ secrets.CERT_NOLA_SENHA }}
          CF_WORKER_URL:  ${{ secrets.CF_WORKER_URL }}
          CF_API_TOKEN:   ${{ secrets.CF_API_TOKEN }}
          SIENGE_USER:    ${{ secrets.SIENGE_USER }}
          SIENGE_PASS:    ${{ secrets.SIENGE_PASS }}
        run: |
          OBRAS="${{ github.event.inputs.obras }}"
          if [ -z "$OBRAS" ]; then
            python -m monitor.backfill_historico_2026
          else
            python -m monitor.backfill_historico_2026 --obras $OBRAS
          fi

      - name: Remover certificados temporarios
        if: always()
        run: rm -f /tmp/cert_max.pfx /tmp/cert_arium.pfx /tmp/cert_confraria_benjamin.pfx /tmp/cert_cora.pfx /tmp/cert_nola.pfx
