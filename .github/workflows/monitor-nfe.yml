name: Monitor NF-e

on:
  schedule:
    - cron: '0 3 * * 1-5'   # Seg-sex: 00:00 Brasília (UTC-3)
  workflow_dispatch:          # Permite rodar manualmente pela aba Actions

jobs:
  monitor:
    name: NF-e ${{ matrix.obra }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Cada obra roda em runner separado (IP diferente) — evita rate limit 656 do SEFAZ
    strategy:
      fail-fast: false
      matrix:
        obra: [max, arium, confraria_benjamin, cora, nola, emanuel_pinto, essenza, massimo, naut, neoon, nort_beach]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Decodificar certificado
        run: |
          case "${{ matrix.obra }}" in
            max)                 echo "${{ secrets.CERT_MAX_B64 }}"                | base64 -d > /tmp/cert.pfx ;;
            arium)               echo "${{ secrets.CERT_ARIUM_B64 }}"              | base64 -d > /tmp/cert.pfx ;;
            confraria_benjamin)  echo "${{ secrets.CERT_CONFRARIA_BENJAMIN_B64 }}" | base64 -d > /tmp/cert.pfx ;;
            cora)                echo "${{ secrets.CERT_CORA_B64 }}"               | base64 -d > /tmp/cert.pfx ;;
            nola)                echo "${{ secrets.CERT_NOLA_B64 }}"               | base64 -d > /tmp/cert.pfx ;;
            emanuel_pinto)       echo "${{ secrets.CERT_EMANUEL_PINTO_B64 }}"      | base64 -d > /tmp/cert.pfx ;;
            essenza)             echo "${{ secrets.CERT_ESSENZA_B64 }}"            | base64 -d > /tmp/cert.pfx ;;
            massimo)             echo "${{ secrets.CERT_MASSIMO_B64 }}"            | base64 -d > /tmp/cert.pfx ;;
            naut)                echo "${{ secrets.CERT_NAUT_B64 }}"               | base64 -d > /tmp/cert.pfx ;;
            neoon)               echo "${{ secrets.CERT_NEEON_B64 }}"              | base64 -d > /tmp/cert.pfx ;;
            nort_beach)          echo "${{ secrets.CERT_NORT_BEACH_B64 }}"         | base64 -d > /tmp/cert.pfx ;;
          esac

      - name: Executar monitor NF-e
        env:
          # Certificado genérico para esta obra (resolvido no step anterior)
          CERT_MAX_PATH:                /tmp/cert.pfx
          CERT_MAX_SENHA:               ${{ secrets.CERT_MAX_SENHA }}
          CERT_ARIUM_PATH:              /tmp/cert.pfx
          CERT_ARIUM_SENHA:             ${{ secrets.CERT_ARIUM_SENHA }}
          CERT_CONFRARIA_BENJAMIN_PATH: /tmp/cert.pfx
          CERT_CONFRARIA_BENJAMIN_SENHA: ${{ secrets.CERT_CONFRARIA_BENJAMIN_SENHA }}
          CERT_CORA_PATH:               /tmp/cert.pfx
          CERT_CORA_SENHA:              ${{ secrets.CERT_CORA_SENHA }}
          CERT_NOLA_PATH:               /tmp/cert.pfx
          CERT_NOLA_SENHA:              ${{ secrets.CERT_NOLA_SENHA }}
          CERT_EMANUEL_PINTO_PATH:      /tmp/cert.pfx
          CERT_EMANUEL_PINTO_SENHA:     ${{ secrets.CERT_EMANUEL_PINTO_SENHA }}
          CERT_ESSENZA_PATH:            /tmp/cert.pfx
          CERT_ESSENZA_SENHA:           ${{ secrets.CERT_ESSENZA_SENHA }}
          CERT_MASSIMO_PATH:            /tmp/cert.pfx
          CERT_MASSIMO_SENHA:           ${{ secrets.CERT_MASSIMO_SENHA }}
          CERT_NAUT_PATH:               /tmp/cert.pfx
          CERT_NAUT_SENHA:              ${{ secrets.CERT_NAUT_SENHA }}
          CERT_NEOON_PATH:              /tmp/cert.pfx
          CERT_NEOON_SENHA:             ${{ secrets.CERT_NEEON_SENHA }}
          CERT_NORT_BEACH_PATH:         /tmp/cert.pfx
          CERT_NORT_BEACH_SENHA:        ${{ secrets.CERT_NORT_BEACH_SENHA }}

          # Cloudflare Worker
          CF_WORKER_URL:  ${{ secrets.CF_WORKER_URL }}
          CF_API_TOKEN:   ${{ secrets.CF_API_TOKEN }}

          # Sienge
          SIENGE_USER: ${{ secrets.SIENGE_USER }}
          SIENGE_PASS: ${{ secrets.SIENGE_PASS }}

          # Notificações
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

          # E-mail (opcional)
          SMTP_HOST:  ${{ secrets.SMTP_HOST }}
          SMTP_PORT:  ${{ secrets.SMTP_PORT }}
          SMTP_USER:  ${{ secrets.SMTP_USER }}
          SMTP_SENHA: ${{ secrets.SMTP_SENHA }}

        run: python -m monitor.main --tipo nfe --obras ${{ matrix.obra }}

      - name: Remover certificado temporário
        if: always()
        run: rm -f /tmp/cert.pfx
