name: Limpar Pendentes Antigos

on:
  workflow_dispatch:

jobs:
  limpar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Remover pendentes anteriores a data_inicio
        env:
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
          CF_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
        run: python -m monitor.limpar_pendentes_antigos
