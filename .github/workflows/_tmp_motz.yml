name: _tmp_motz
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11', cache: pip}
      - run: pip install -r requirements.txt
      - env:
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
          CF_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import os, requests
          url  = os.environ['CF_WORKER_URL'].rstrip('/') + '/api/pendentes'
          data = requests.get(url, params={'token': os.environ['CF_API_TOKEN']}, timeout=30).json()
          for obra in data:
              for lista, label in [(obra.get('pendentes',[]),'PENDENTE'),(obra.get('lancadas',[]),'LANCADA')]:
                  for n in lista:
                      if 'MOTZ' in (n.get('nome_prest','') or '').upper():
                          print(f"[{label}] obra={obra['key']} nr={n.get('numero')} data={n.get('data_emissao')} has_pdf={n.get('has_pdf')} cnpj={n.get('cnpj_prest')} valor={n.get('valor')} chave={n.get('chave','')[:30]}")
          PYEOF
